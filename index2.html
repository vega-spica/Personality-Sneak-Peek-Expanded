        //do not be fooled by the mention of "canvas" in this function; this specifically applies chroma filters to a static png image.
        //chroma filters for animated models have been added to spine-webgl.js. but we don't talk about that.
        const CHROMA_CHANNEL_INDEX = { r: 0, g: 1, b: 2 };

        async function applyChromaToImage(img, swizzle) {
            if (!img || !img.src) return;

            const srcR = CHROMA_CHANNEL_INDEX[swizzle[0]];
            const srcG = CHROMA_CHANNEL_INDEX[swizzle[1]];
            const srcB = CHROMA_CHANNEL_INDEX[swizzle[2]];

            if (srcR === undefined || srcG === undefined || srcB === undefined)
                return;

            const source = new Image();
            source.crossOrigin = "anonymous";

            source.onload = () => {
                const canvas = document.createElement("canvas");
                canvas.width = source.naturalWidth;
                canvas.height = source.naturalHeight;

                const ctx = canvas.getContext("2d");
                ctx.drawImage(source, 0, 0);

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i];
                    const g = data[i + 1];
                    const b = data[i + 2];

                    data[i]     = [r, g, b][srcR];
                    data[i + 1] = [r, g, b][srcG];
                    data[i + 2] = [r, g, b][srcB];
                }

                ctx.putImageData(imageData, 0, 0);

                img.src = canvas.toDataURL("image/png");
            };

            source.src = img.dataset.originalSrc;
        }

        function setchromaState(value) {

                chromaState
            );
        }

        //Selora GenDive almost confirmed to be in Smash. almost.
        function initializeAnimationButtons() {
            const form = speciesJson?.[speciesName]?.stage?.[stage]?.forms?.[formNumber];
            if (!form) return;

            let hasCombat = false;

            for (const g in form.genders) {
                if (form.genders[g]?.color === "dv3") {
                    hasCombat = true;
                    break;
                }
            }

            const combatDiv = document.getElementById("combatAnims");

            combatDiv.style.opacity = hasCombat ? "" : "0.3";

            //in case a selected animation goes poof.
            if (document.getElementById("attack").checked ||
                document.getElementById("skill").checked) {
                document.getElementById("idle").checked = true;
                setanimState("idle");
            }
        }

        //load new dragon when changed
        function changeDragonSprite(){
            //get dragon url parts
            formNumber = form.value;
            var colorName = speciesJson[speciesName].stage[stage].forms[formNumber].genders[gender].color;

            //construct url
            var url = "";
            //is it undead? or is it dead dead?
            if (formNumber.indexOf("undead") !== -1){
                var undeadres = speciesJson[speciesName].stage[stage].forms[formNumber].genders[gender].undeadres;
                url = "https://vega-spica.github.io/Personality-Sneak-Peek-Expanded/res/spine/character/dragon/" + "undead" + "/" + "undead" +"_" + undeadres + "/" + "undead" + "_" + undeadres;
            }
            //no idea why they put these in a separate folder but sure i guess??
            else if (stage.indexOf("essence") !== -1) {
                url = "https://vega-spica.github.io/Personality-Sneak-Peek-Expanded/res/spine/character/dragon/essence/" + speciesName + "_" + formNumber + "_" + gender + "_" + stage + "_" + colorName + "/" + speciesName + "_" + formNumber + "_" + gender + "_" + stage + "_" + colorName;

        let toastTimer;

        function showToast(message) {
            let toast = document.getElementById("toast");

            if (!toast) {
                toast = document.createElement("div");
                toast.id = "toast";
                toast.className = "toast";
                document.body.appendChild(toast);
            }

            toast.textContent = message;

            clearTimeout(toastTimer);

            toast.classList.add("show");

            toastTimer = setTimeout(() => {
                toast.classList.remove("show");
            }, 2500);
        }

        //auto page resizing; pretty cool, right?
        //well, touch this and the entire site falls apart. not so cool.
        var fitPageEl = null;
        var fitResizeRaf = 0;

        function fitPage(instant) {
            var page = fitPageEl || (fitPageEl = document.querySelector(".page"));
            if (!page) return;
            var pageWidth = page.offsetWidth;
            var pageHeight = page.offsetHeight;
            if (!pageWidth || !pageHeight) return;
            var scale = Math.min(window.innerWidth / pageWidth, window.innerHeight / pageHeight, 1);
            if (instant) {
            var prev = page.style.transition;
            page.style.transition = "none";
            page.style.transform = "scale(" + scale + ")";
            void page.offsetHeight;
            page.style.transition = prev;
            } else {
            page.style.transform = "scale(" + scale + ")";
            }
        }

        function fitPageOnResize() {
            if (fitResizeRaf) return;
            fitResizeRaf = requestAnimationFrame(function () {
            fitResizeRaf = 0;
            fitPage(false);
            });
        }

        function initFitToScreen() {
            fitPage(false);
            var page = fitPageEl || (fitPageEl = document.querySelector(".page"));
            if (page) page.classList.add("fit-ready");
            window.addEventListener("resize", fitPageOnResize);
            if (document.fonts && document.fonts.ready) {
            document.fonts.ready.then(function () { fitPage(true); });
            }
            window.addEventListener("load", function () { fitPage(true); });
        }

            <script>
                //okay, okay, i get it. you want a searchbar.
                    //you get ONE searchbar.
                function createSearchDropdown({ searchId, dropdownId, selectId, onChange }) {
                    const searchBox = document.getElementById(searchId);
                    const dropdown = document.getElementById(dropdownId);
                    const select = document.getElementById(selectId);

                    function populate() {
                        dropdown.innerHTML = ""; // wipe existing options

                        for (let option of select.options) {
                            let div = document.createElement("div");
                            div.textContent = option.text;
                            div.setAttribute("data-value", option.value);

                            div.onclick = function () {
                                searchBox.value = this.textContent;
                                select.value = this.getAttribute("data-value");
                                dropdown.style.display = "none";
                                dropdown.parentElement.classList.remove("active");
                                onChange();
                            };

                            dropdown.appendChild(div);
                        }
                    }

                    // filter options
                    function filter() {
                        let filter = searchBox.value.toLowerCase();
                        let items = dropdown.getElementsByTagName("div");

                        dropdown.style.display = filter ? "block" : "none";

                        for (let item of items) {
                            let txt = item.textContent.toLowerCase();
                            item.style.display = txt.includes(filter) ? "block" : "none";
                        }
                    }

                    // show all options on focus 
                        //"onclick" was not cooperating, so i fired them.
                    function showAll() {
                        dropdown.style.display = "block";
                        dropdown.parentElement.classList.add("active");

                        let items = dropdown.getElementsByTagName("div");
                        for (let item of items) {
                            item.style.display = "block";
                        }
                    }

                    function onFocus() {
                        searchBox.select();// select searchbox text on focus (if there is already text present)
                        showAll();
                    }

                    // events
                    searchBox.addEventListener("keyup", filter);
                    searchBox.addEventListener("focus", onFocus);

                    // close dropdown on outside click
                    document.addEventListener("click", function (event) {
                        if (!searchBox.contains(event.target) && !dropdown.contains(event.target)) {
                            dropdown.style.display = "none";
                            dropdown.parentElement.classList.remove("active");
                        }
                    });

                    // observe changes
                    new MutationObserver(populate).observe(select, { childList: true });

                    populate();
                }

                // ONE searchbar.
                createSearchDropdown({
                    searchId: "speciesSearch",
                    dropdownId: "dropdown",
                    selectId: "species",
                    onChange: updateSpecies
                });
                //...okay, fine, you can have more searchbars.            
                createSearchDropdown({
                    searchId: "personalitySearch",
                    dropdownId: "personalityDropdown",
                    selectId: "personality",
                    onChange: updatePersonalityUrl
                });

                createSearchDropdown({
                    searchId: "bgSearch",
                    dropdownId: "bgDropdown",
                    selectId: "cavebg",
                    onChange: updateBackgroundUrl
                });

                createSearchDropdown({
                    searchId: "floorSearch",
                    dropdownId: "floorDropdown",
                    selectId: "cavefloor",
                    onChange: updateFloorUrl
                });

                let helpOpen = false;
                let helpLoaded = false;

                /* it's okay. we all need some help sometimes. */
                async function helpMenu() {
                    const overlay = document.getElementById("helpOverlay");
                    const helpText = document.getElementById("helpText");

                    helpOpen = !helpOpen;

                    if (helpOpen) {
                        overlay.classList.add("open");

                        if (!helpLoaded) {
                            try {
                                const response = await fetch("./help_menu.txt");

                                if (!response.ok) {
                                    throw new Error("Could not load help menu.");
                                }

                                const text = await response.text();

                                helpText.innerHTML = text.replace(/\n/g, "<br>");
                                helpLoaded = true;

                            } catch (error) {
                                console.error(error);
                                helpText.textContent = "Failed to load help menu.";
                            }
                        }
                    } else {
                        overlay.classList.remove("open");
                    }
                }

                //close button
                document.getElementById("helpOverlay").addEventListener("click", function(event) {
                    if (event.target === this) {
                        helpMenu();
                    }
                });

                //or ESC button
                document.addEventListener("keydown", function(event) {
                    if (event.key === "Escape" && helpOpen) {
                        helpMenu();
                    }
                });
            </script>
